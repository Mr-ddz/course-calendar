	<svg width="400" height="450" viewBox="0 0 400 450" xmlns="http://www.w3.org/2000/svg">
	  <defs>
	    <!-- 主体渐变色 (模仿原图的蓝绿到深蓝过渡) -->
	    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
	      <stop offset="0%" style="stop-color:#29B6F6;stop-opacity:1" />
	      <stop offset="50%" style="stop-color:#039BE5;stop-opacity:1" />
	      <stop offset="100%" style="stop-color:#0277BD;stop-opacity:1" />
	    </linearGradient>
	    <!-- 边框高光 -->
	    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
	      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
	      <stop offset="100%" style="stop-color:#01579B;stop-opacity:1" />
	    </linearGradient>
	    <!-- 投影效果 -->
	    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
	      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
	      <feOffset dx="5" dy="8" result="offsetblur"/>
	      <feComponentTransfer>
	        <feFuncA type="linear" slope="0.3"/>
	      </feComponentTransfer>
	      <feMerge> 
	        <feMergeNode/>
	        <feMergeNode in="SourceGraphic"/> 
	      </feMerge>
	    </filter>
	    <!-- 文字立体感 -->
	    <filter id="textShadow">
	      <feDropShadow dx="2" dy="2" stdDeviation="1" flood-color="#000000" flood-opacity="0.2"/>
	    </filter>
	  </defs>
	  <!-- 盾牌主体 (带投影) -->
	  <g filter="url(#dropShadow)">
	    <!-- 外层边框 -->
	    <path d="M200 40 
	             L340 80 
	             L340 220 
	             C340 300 280 360 200 400 
	             C120 360 60 300 60 220 
	             L60 80 Z" 
	          fill="url(#borderGrad)" stroke="#0277BD" stroke-width="4"/>
	    <!-- 内层面板 -->
	    <path d="M200 65 
	             L315 98 
	             L315 215 
	             C315 285 265 338 200 372 
	             C135 338 85 285 85 215 
	             L85 98 Z" 
	          fill="url(#shieldGrad)" stroke="#E1F5FE" stroke-width="3" opacity="0.95"/>
	    <!-- 高光效果 (左上角反光) -->
	    <path d="M200 70 
	             L310 100 
	             L310 180 
	             C250 160 150 160 90 180 
	             L90 100 Z" 
	          fill="white" opacity="0.15"/>
	  </g>
	  <!-- 文字 "课表侠" -->
	  <text x="200" y="235" 
	        font-family="'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif" 
	        font-size="72" 
	        font-weight="900" 
	        fill="white" 
	        text-anchor="middle" 
	        filter="url(#textShadow)"
	        letter-spacing="4">课表侠</text>
	</svg>