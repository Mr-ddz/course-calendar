name: 部署到阿里云

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 连接阿里云并部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: root
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script: |
            set -e
            echo "📦 拉取最新代码..."
            cd /root
            git fetch origin
            git reset --hard origin/develop

            echo "🔧 安装前端依赖并构建..."
            cd frontend
            npm install
            npm run build
            cd ..

            echo "🔧 安装后端依赖..."
            cd backend
            npm install
            cd ..

            echo "🚀 重启服务..."
            pm2 restart course-calendar

            echo "✅ 部署完成"
