name: 部署到阿里云

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 构建前端
        run: |
          cd frontend
          npm install
          npm run build

      - name: 上传到阿里云
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: root
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          source: "backend,frontend/dist,frontend/package.json,frontend/package-lock.json,package.json,package-lock.json"
          target: "/root"
          strip_components: 0
          rm: false

      - name: 重启服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: root
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script: |
            set -e
            echo "🔧 安装后端依赖..."
            cd /root/backend
            npm install

            echo "🚀 重启服务..."
            pm2 restart course-calendar

            echo "✅ 部署完成"
